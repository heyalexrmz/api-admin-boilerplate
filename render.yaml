services:
  - type: web
    name: demo-glm-web
    runtime: node
    plan: starter
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm build
    preDeployCommand: pnpm db:migrate
    startCommand: NODE_ENV=production pnpm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: demo-glm-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: DOCUMENT_SIGNING_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: UPSTREAM_BASE_URL
        sync: false
      - key: UPSTREAM_API_KEY
        sync: false
      - key: UPSTREAM_WEBHOOK_HEADER
        value: typeform-signature
      - key: UPSTREAM_WEBHOOK_TOKEN
        sync: false
      - key: UPSTREAM_WEBHOOK_SECRET
        sync: false
      - key: UPSTREAM_WEBHOOK_SECRET_PREVIOUS
        sync: false
      - key: UPSTREAM_ASSET_HOSTS
        sync: false

  - type: worker
    name: demo-glm-worker
    runtime: node
    plan: starter
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod=false
    startCommand: NODE_ENV=production pnpm exec tsx worker/index.ts
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: demo-glm-db
          property: connectionString
      - key: DOCUMENT_SIGNING_SECRET
        fromService:
          name: demo-glm-web
          type: web
          envVarKey: DOCUMENT_SIGNING_SECRET
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: WORKER_POLL_INTERVAL_MS
        value: "2000"
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: UPSTREAM_BASE_URL
        sync: false
      - key: UPSTREAM_API_KEY
        sync: false
      - key: UPSTREAM_WEBHOOK_HEADER
        value: typeform-signature
      - key: UPSTREAM_WEBHOOK_TOKEN
        sync: false
      - key: UPSTREAM_WEBHOOK_SECRET
        sync: false
      - key: UPSTREAM_WEBHOOK_SECRET_PREVIOUS
        sync: false
      - key: UPSTREAM_ASSET_HOSTS
        sync: false

databases:
  - name: demo-glm-db
    plan: basic-256mb
    region: oregon
